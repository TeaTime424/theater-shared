<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 550" width="850" height="550">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="850" height="550" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="425" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1e293b">Trigger Distribution Box - Internal Schematic</text>
  
  <!-- Main enclosure -->
  <rect x="150" y="60" width="550" height="420" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="425" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#059669">ENCLOSURE (100×60×25mm Project Box)</text>
  
  <!-- ===== 12V Wall Adapter (External) ===== -->
  <rect x="20" y="100" width="100" height="70" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="70" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#92400e">12V DC</text>
  <text x="70" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a16207">Wall Adapter</text>
  <text x="70" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#a16207">500mA min</text>
  
  <!-- DC Jack -->
  <rect x="160" y="110" width="60" height="50" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="190" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#92400e">DC JACK</text>
  <text x="190" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#a16207">5.5×2.1mm</text>
  
  <!-- Wire from adapter to DC jack -->
  <line x1="120" y1="135" x2="160" y2="135" stroke="#d97706" stroke-width="2"/>
  
  <!-- ===== Trigger Input (External) ===== -->
  <rect x="20" y="280" width="100" height="70" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="70" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#1e40af">FROM AV10</text>
  <text x="70" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#3b82f6">Trigger Out</text>
  <text x="70" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#3b82f6">12V / 150mA</text>
  
  <!-- Trigger Input Jack -->
  <rect x="160" y="290" width="60" height="50" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="190" y="312" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1e40af">INPUT</text>
  <text x="190" y="328" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#3b82f6">3.5mm Mono</text>
  
  <!-- Wire from AV10 to input jack -->
  <line x1="120" y1="315" x2="160" y2="315" stroke="#2563eb" stroke-width="2"/>
  
  <!-- ===== Internal Relay ===== -->
  <rect x="280" y="180" width="120" height="140" rx="6" fill="white" stroke="#374151" stroke-width="2"/>
  <text x="340" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#374151">RELAY</text>
  <text x="340" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">SPST 12V DC</text>
  
  <!-- Coil symbol -->
  <rect x="300" y="230" width="80" height="30" fill="#f3f4f6" stroke="#374151" stroke-width="1.5"/>
  <text x="340" y="250" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#374151">COIL</text>
  <text x="295" y="248" text-anchor="end" font-family="Arial, sans-serif" font-size="9" fill="#dc2626">+</text>
  <text x="385" y="248" text-anchor="start" font-family="Arial, sans-serif" font-size="9" fill="#64748b">−</text>
  
  <!-- Contact symbol (N.O.) -->
  <line x1="310" y1="280" x2="310" y2="300" stroke="#374151" stroke-width="2"/>
  <line x1="310" y1="300" x2="340" y2="290" stroke="#374151" stroke-width="2"/>
  <circle cx="345" cy="290" r="4" fill="none" stroke="#374151" stroke-width="1.5"/>
  <line x1="349" y1="290" x2="370" y2="290" stroke="#374151" stroke-width="2"/>
  <line x1="370" y1="280" x2="370" y2="300" stroke="#374151" stroke-width="2"/>
  <text x="340" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#6b7280">N.O. CONTACTS</text>
  
  <!-- ===== Flyback Diode ===== -->
  <rect x="280" y="335" width="70" height="40" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="315" y="352" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#dc2626">1N4001</text>
  <text x="315" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#b91c1c">Flyback</text>
  
  <!-- ===== PTC FUSES ===== -->
  <rect x="450" y="130" width="100" height="250" rx="6" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="500" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#dc2626">PTC FUSES</text>
  <text x="500" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#b91c1c">100mA Resettable</text>
  
  <!-- Individual PTC symbols -->
  <rect x="470" y="180" width="60" height="16" rx="2" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
  <text x="500" y="192" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#991b1b">PTC 1</text>
  
  <rect x="470" y="205" width="60" height="16" rx="2" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
  <text x="500" y="217" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#991b1b">PTC 2</text>
  
  <rect x="470" y="230" width="60" height="16" rx="2" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
  <text x="500" y="242" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#991b1b">PTC 3</text>
  
  <rect x="470" y="255" width="60" height="16" rx="2" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
  <text x="500" y="267" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#991b1b">PTC 4</text>
  
  <rect x="470" y="280" width="60" height="16" rx="2" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
  <text x="500" y="292" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#991b1b">PTC 5</text>
  
  <rect x="470" y="305" width="60" height="16" rx="2" fill="#fecaca" stroke="#dc2626" stroke-width="1"/>
  <text x="500" y="317" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#991b1b">PTC 6</text>
  
  <text x="500" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#991b1b">Bourns MF-R010</text>
  <text x="500" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#991b1b">Hold: 100mA</text>
  <text x="500" y="374" text-anchor="middle" font-family="Arial, sans-serif" font-size="7" fill="#991b1b">Trip: 200mA</text>
  
  <!-- ===== Output Jacks ===== -->
  <rect x="580" y="130" width="110" height="250" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="635" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#c2410c">OUTPUTS</text>
  <text x="635" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#ea580c">3.5mm Mono × 6</text>
  
  <!-- Individual output jacks -->
  <circle cx="635" cy="190" r="14" fill="white" stroke="#ea580c" stroke-width="2"/>
  <text x="635" y="194" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#ea580c">1</text>
  
  <circle cx="635" cy="225" r="14" fill="white" stroke="#ea580c" stroke-width="2"/>
  <text x="635" y="229" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#ea580c">2</text>
  
  <circle cx="635" cy="260" r="14" fill="white" stroke="#ea580c" stroke-width="2"/>
  <text x="635" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#ea580c">3</text>
  
  <circle cx="635" cy="295" r="14" fill="white" stroke="#ea580c" stroke-width="2"/>
  <text x="635" y="299" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#ea580c">4</text>
  
  <circle cx="635" cy="330" r="14" fill="white" stroke="#ea580c" stroke-width="2"/>
  <text x="635" y="334" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#ea580c">5</text>
  
  <circle cx="635" cy="365" r="14" fill="white" stroke="#ea580c" stroke-width="2"/>
  <text x="635" y="369" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#ea580c">6</text>
  
  <!-- ===== WIRING ===== -->
  
  <!-- +12V from DC jack to relay contact (via top rail) -->
  <line x1="220" y1="120" x2="250" y2="120" stroke="#d97706" stroke-width="2.5"/>
  <line x1="250" y1="120" x2="250" y2="280" stroke="#d97706" stroke-width="2.5"/>
  <line x1="250" y1="280" x2="310" y2="280" stroke="#d97706" stroke-width="2.5"/>
  <text x="235" y="115" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#d97706">+12V</text>
  
  <!-- From relay N.O. output to PTC fuses -->
  <line x1="370" y1="290" x2="430" y2="290" stroke="#ea580c" stroke-width="2.5"/>
  <line x1="430" y1="188" x2="430" y2="313" stroke="#ea580c" stroke-width="2.5"/>
  
  <!-- Lines to each PTC input -->
  <line x1="430" y1="188" x2="470" y2="188" stroke="#ea580c" stroke-width="2"/>
  <line x1="430" y1="213" x2="470" y2="213" stroke="#ea580c" stroke-width="2"/>
  <line x1="430" y1="238" x2="470" y2="238" stroke="#ea580c" stroke-width="2"/>
  <line x1="430" y1="263" x2="470" y2="263" stroke="#ea580c" stroke-width="2"/>
  <line x1="430" y1="288" x2="470" y2="288" stroke="#ea580c" stroke-width="2"/>
  <line x1="430" y1="313" x2="470" y2="313" stroke="#ea580c" stroke-width="2"/>
  
  <!-- Lines from PTC output to jacks -->
  <line x1="530" y1="188" x2="560" y2="188" stroke="#ea580c" stroke-width="2"/>
  <line x1="560" y1="188" x2="560" y2="190" stroke="#ea580c" stroke-width="2"/>
  <line x1="560" y1="190" x2="621" y2="190" stroke="#ea580c" stroke-width="2"/>
  
  <line x1="530" y1="213" x2="560" y2="213" stroke="#ea580c" stroke-width="2"/>
  <line x1="560" y1="213" x2="560" y2="225" stroke="#ea580c" stroke-width="2"/>
  <line x1="560" y1="225" x2="621" y2="225" stroke="#ea580c" stroke-width="2"/>
  
  <line x1="530" y1="238" x2="560" y2="238" stroke="#ea580c" stroke-width="2"/>
  <line x1="560" y1="238" x2="560" y2="260" stroke="#ea580c" stroke-width="2"/>
  <line x1="560" y1="260" x2="621" y2="260" stroke="#ea580c" stroke-width="2"/>
  
  <line x1="530" y1="263" x2="560" y2="263" stroke="#ea580c" stroke-width="2"/>
  <line x1="560" y1="263" x2="560" y2="295" stroke="#ea580c" stroke-width="2"/>
  <line x1="560" y1="295" x2="621" y2="295" stroke="#ea580c" stroke-width="2"/>
  
  <line x1="530" y1="288" x2="560" y2="288" stroke="#ea580c" stroke-width="2"/>
  <line x1="560" y1="288" x2="560" y2="330" stroke="#ea580c" stroke-width="2"/>
  <line x1="560" y1="330" x2="621" y2="330" stroke="#ea580c" stroke-width="2"/>
  
  <line x1="530" y1="313" x2="560" y2="313" stroke="#ea580c" stroke-width="2"/>
  <line x1="560" y1="313" x2="560" y2="365" stroke="#ea580c" stroke-width="2"/>
  <line x1="560" y1="365" x2="621" y2="365" stroke="#ea580c" stroke-width="2"/>
  
  <!-- Trigger input to relay coil (+) -->
  <line x1="220" y1="305" x2="260" y2="305" stroke="#2563eb" stroke-width="2.5"/>
  <line x1="260" y1="245" x2="260" y2="305" stroke="#2563eb" stroke-width="2.5"/>
  <line x1="260" y1="245" x2="300" y2="245" stroke="#2563eb" stroke-width="2.5"/>
  <text x="265" y="280" font-family="Arial, sans-serif" font-size="8" fill="#2563eb">+12V</text>
  <text x="265" y="292" font-family="Arial, sans-serif" font-size="8" fill="#2563eb">trigger</text>
  
  <!-- Ground bus -->
  <line x1="220" y1="150" x2="240" y2="150" stroke="#64748b" stroke-width="2.5"/>
  <line x1="240" y1="150" x2="240" y2="440" stroke="#64748b" stroke-width="2.5"/>
  
  <!-- GND to relay coil (-) -->
  <line x1="380" y1="245" x2="410" y2="245" stroke="#64748b" stroke-width="2"/>
  <line x1="410" y1="245" x2="410" y2="440" stroke="#64748b" stroke-width="2"/>
  <line x1="240" y1="440" x2="410" y2="440" stroke="#64748b" stroke-width="2"/>
  
  <!-- GND to trigger input sleeve -->
  <line x1="220" y1="325" x2="240" y2="325" stroke="#64748b" stroke-width="2"/>
  
  <!-- GND to flyback diode -->
  <line x1="315" y1="375" x2="315" y2="440" stroke="#64748b" stroke-width="1.5"/>
  
  <!-- Flyback diode + connection to coil + -->
  <line x1="280" y1="355" x2="260" y2="355" stroke="#dc2626" stroke-width="1.5"/>
  <line x1="260" y1="245" x2="260" y2="355" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="3,2"/>
  
  <!-- GND to output jacks (sleeves) - single bus -->
  <line x1="410" y1="400" x2="570" y2="400" stroke="#64748b" stroke-width="2"/>
  <line x1="570" y1="200" x2="570" y2="400" stroke="#64748b" stroke-width="1.5"/>
  
  <!-- Ground symbol at bottom -->
  <line x1="325" y1="455" x2="325" y2="470" stroke="#64748b" stroke-width="2"/>
  <line x1="315" y1="470" x2="335" y2="470" stroke="#64748b" stroke-width="2"/>
  <line x1="319" y1="475" x2="331" y2="475" stroke="#64748b" stroke-width="1.5"/>
  <line x1="323" y1="480" x2="327" y2="480" stroke="#64748b" stroke-width="1"/>
  <line x1="240" y1="455" x2="410" y2="455" stroke="#64748b" stroke-width="2"/>
  <line x1="325" y1="440" x2="325" y2="455" stroke="#64748b" stroke-width="2"/>
  
  <!-- ===== Legend ===== -->
  <rect x="20" y="380" width="120" height="100" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="80" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#475569">LEGEND</text>
  <line x1="30" y1="415" x2="55" y2="415" stroke="#d97706" stroke-width="2.5"/>
  <text x="60" y="419" font-family="Arial, sans-serif" font-size="8" fill="#475569">+12V (adapter)</text>
  <line x1="30" y1="432" x2="55" y2="432" stroke="#2563eb" stroke-width="2.5"/>
  <text x="60" y="436" font-family="Arial, sans-serif" font-size="8" fill="#475569">+12V (trigger)</text>
  <line x1="30" y1="449" x2="55" y2="449" stroke="#ea580c" stroke-width="2.5"/>
  <text x="60" y="453" font-family="Arial, sans-serif" font-size="8" fill="#475569">+12V (protected)</text>
  <line x1="30" y1="466" x2="55" y2="466" stroke="#64748b" stroke-width="2.5"/>
  <text x="60" y="470" font-family="Arial, sans-serif" font-size="8" fill="#475569">Ground</text>
  
  <!-- Current flow note -->
  <rect x="710" y="130" width="130" height="120" rx="4" fill="#f0fdf4" stroke="#16a34a" stroke-width="1"/>
  <text x="775" y="148" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#166534">CURRENT BUDGET</text>
  <text x="720" y="168" font-family="Arial, sans-serif" font-size="8" fill="#166534">AV10 draws: ~40mA</text>
  <text x="720" y="183" font-family="Arial, sans-serif" font-size="8" fill="#166534">Adapter provides: 500mA</text>
  <text x="720" y="198" font-family="Arial, sans-serif" font-size="8" fill="#166534">Per output max: 100mA</text>
  <text x="720" y="213" font-family="Arial, sans-serif" font-size="8" fill="#166534">6 amps × 40mA = 240mA</text>
  <text x="720" y="233" font-family="Arial, sans-serif" font-size="8" fill="#16a34a" font-weight="bold">Headroom: 260mA ✓</text>
  
  <!-- Protection note -->
  <rect x="710" y="260" width="130" height="90" rx="4" fill="#fef2f2" stroke="#dc2626" stroke-width="1"/>
  <text x="775" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#dc2626">PROTECTION</text>
  <text x="720" y="298" font-family="Arial, sans-serif" font-size="8" fill="#991b1b">Each output limited</text>
  <text x="720" y="313" font-family="Arial, sans-serif" font-size="8" fill="#991b1b">to 100mA by PTC</text>
  <text x="720" y="333" font-family="Arial, sans-serif" font-size="8" fill="#991b1b">Auto-resets after</text>
  <text x="720" y="348" font-family="Arial, sans-serif" font-size="8" fill="#991b1b">fault clears</text>
  
  <!-- Output labels -->
  <text x="635" y="400" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#6b7280">Tip = +12V</text>
  <text x="635" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" fill="#6b7280">(fuse protected)</text>
</svg>
