<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dual-Opposed Sub - Cross Sections</title>
    <style>
        body {
            background: #1a1a2e;
            color: #eee;
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
        }
        h1 { text-align: center; color: #fff; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #888; margin-bottom: 30px; }
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
            max-width: 1200px;
            margin: 0 auto;
        }
        .diagram {
            background: #252540;
            border-radius: 12px;
            padding: 20px;
            flex: 1 1 450px;
            max-width: 550px;
        }
        .diagram h2 {
            color: #7eb8da;
            margin: 0 0 15px 0;
            text-align: center;
            font-size: 1rem;
        }
        svg { display: block; margin: 0 auto; }
        
        .mdf { fill: #c4a574; stroke: #8b7355; stroke-width: 1.5; }
        .brace { fill: #b89a64; stroke: #8b7355; stroke-width: 1; }
        .leg { fill: #8b6914; stroke: #5a4510; stroke-width: 1.5; }
        .driver { fill: #2d2d4a; stroke: #f0a050; stroke-width: 2; }
        .driver-cone { fill: none; stroke: #f0a050; stroke-width: 1.5; }
        .driver-magnet { fill: #3a3a5a; stroke: #f0a050; stroke-width: 1.5; }
        .cutout { fill: #252540; stroke: #555; stroke-width: 1; }
        .air-gap { fill: rgba(100, 200, 255, 0.12); }
        .rubber { fill: #2a2a2a; stroke: #444; stroke-width: 1; }
        .floor { fill: #3d3d3d; stroke: #666; stroke-width: 1; }
        .grille { fill: rgba(100,100,100,0.3); stroke: #888; stroke-width: 1; stroke-dasharray: 3,2; }
        
        .dim-line { stroke: #f0a050; stroke-width: 1; }
        .dim-text { font-size: 10px; fill: #f0a050; font-weight: bold; }
        .label { font-size: 10px; fill: #ccc; }
        .label-small { font-size: 9px; fill: #999; }
        .annotation { font-size: 9px; fill: #7eb8da; }
        .callout { font-size: 10px; fill: #8c8; }
        
        .airflow { stroke: #64c8ff; stroke-width: 2; fill: none; marker-end: url(#airArrow); }
    </style>
</head>
<body>
    <h1>Cross Section Views</h1>
    <p class="subtitle">Internal Structure and Dimensions</p>
    
    <div class="container">
        
        <!-- Side Cross Section -->
        <div class="diagram">
            <h2>Side Cross Section — Bracing & Drivers</h2>
            <svg width="450" height="550" viewBox="0 0 450 550">
                <defs>
                    <marker id="airArrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
                        <polygon points="0 0, 8 3, 0 6" fill="#64c8ff"/>
                    </marker>
                </defs>
                
                <!-- Floor -->
                <rect x="30" y="490" width="390" height="40" class="floor"/>
                <text x="225" y="515" text-anchor="middle" class="label">FLOOR</text>
                
                <!-- Air gap -->
                <rect x="100" y="440" width="250" height="50" class="air-gap"/>
                
                <!-- Corner legs -->
                <rect x="100" y="440" width="30" height="50" class="leg" rx="2"/>
                <rect x="320" y="440" width="30" height="50" class="leg" rx="2"/>
                <rect x="100" y="485" width="30" height="5" class="rubber"/>
                <rect x="320" y="485" width="30" height="5" class="rubber"/>
                
                <!-- Cabinet shell -->
                <rect x="90" y="135" width="270" height="305" class="mdf" rx="2"/>
                
                <!-- Internal cavity -->
                <rect x="100" y="145" width="250" height="285" class="cutout"/>
                
                <!-- Top panel -->
                <rect x="90" y="120" width="270" height="15" class="mdf"/>
                <rect x="160" y="120" width="130" height="15" class="cutout"/>
                
                <!-- Bottom panel -->
                <rect x="90" y="440" width="270" height="15" class="mdf"/>
                <rect x="160" y="440" width="130" height="15" class="cutout"/>
                
                <!-- Upper brace -->
                <rect x="100" y="200" width="250" height="12" class="brace"/>
                <rect x="175" y="200" width="100" height="12" class="cutout"/>
                <text x="225" y="210" text-anchor="middle" class="label-small">UPPER BRACE</text>
                
                <!-- Lower brace -->
                <rect x="100" y="360" width="250" height="12" class="brace"/>
                <rect x="175" y="360" width="100" height="12" class="cutout"/>
                <text x="225" y="370" text-anchor="middle" class="label-small">LOWER BRACE</text>
                
                <!-- Top driver -->
                <ellipse cx="225" cy="128" rx="55" ry="12" class="driver"/>
                <ellipse cx="225" cy="128" rx="40" ry="8" class="driver-cone"/>
                <rect x="190" y="140" width="70" height="45" class="driver-magnet" rx="2"/>
                <text x="225" y="170" text-anchor="middle" class="label-small" style="fill: #f0a050;">Motor</text>
                
                <!-- Bottom driver -->
                <ellipse cx="225" cy="447" rx="55" ry="12" class="driver"/>
                <ellipse cx="225" cy="447" rx="40" ry="8" class="driver-cone"/>
                <rect x="190" y="385" width="70" height="45" class="driver-magnet" rx="2"/>
                <text x="225" y="410" text-anchor="middle" class="label-small" style="fill: #f0a050;">Motor</text>
                
                <!-- Grille -->
                <ellipse cx="225" cy="105" rx="60" ry="15" class="grille"/>
                <text x="225" y="90" text-anchor="middle" class="label-small">Grille</text>
                
                <!-- Airflow arrows -->
                <path d="M 180 460 L 180 475 L 60 475" class="airflow"/>
                <path d="M 270 460 L 270 475 L 390 475" class="airflow"/>
                
                <!-- Dimensions -->
                <!-- Overall height -->
                <line x1="60" y1="120" x2="60" y2="455" class="dim-line"/>
                <line x1="55" y1="120" x2="65" y2="120" class="dim-line"/>
                <line x1="55" y1="455" x2="65" y2="455" class="dim-line"/>
                <text x="50" y="290" text-anchor="middle" class="dim-text" transform="rotate(-90, 50, 290)">29.5"</text>
                
                <!-- Leg height -->
                <line x1="380" y1="440" x2="380" y2="490" class="dim-line"/>
                <line x1="375" y1="440" x2="385" y2="440" class="dim-line"/>
                <line x1="375" y1="490" x2="385" y2="490" class="dim-line"/>
                <text x="400" y="470" class="dim-text">4"</text>
                
                <!-- Brace position from top -->
                <line x1="370" y1="135" x2="370" y2="206" class="dim-line"/>
                <line x1="365" y1="135" x2="375" y2="135" class="dim-line"/>
                <line x1="365" y1="206" x2="375" y2="206" class="dim-line"/>
                <text x="400" y="175" class="dim-text">9.5"</text>
                
                <!-- Motor clearance annotation -->
                <text x="290" y="155" class="annotation">← Motor clears brace</text>
                
                <!-- Annotations -->
                <text x="50" y="475" class="annotation">Air out ←</text>
                <text x="395" y="475" class="annotation">→ Air out</text>
            </svg>
        </div>
        
        <!-- Top Cross Section (horizontal cut) -->
        <div class="diagram">
            <h2>Horizontal Cross Section — At Mid-Height</h2>
            <svg width="400" height="420" viewBox="0 0 400 420">
                <!-- Cabinet outline (cut through sides) -->
                <rect x="50" y="50" width="300" height="300" class="mdf" rx="2"/>
                
                <!-- Internal cavity -->
                <rect x="60" y="60" width="280" height="280" class="cutout"/>
                
                <!-- Window brace (cut through) -->
                <rect x="60" y="175" width="280" height="12" class="brace"/>
                <rect x="150" y="175" width="100" height="12" class="cutout"/>
                
                <!-- Labels -->
                <text x="200" y="100" text-anchor="middle" class="label">Internal Chamber</text>
                <text x="200" y="120" text-anchor="middle" class="label-small">(28" × 28" × 28")</text>
                
                <text x="200" y="184" text-anchor="middle" class="label-small" style="fill: #ccc;">WINDOW BRACE</text>
                
                <text x="200" y="280" text-anchor="middle" class="label">Open below brace</text>
                <text x="200" y="295" text-anchor="middle" class="label-small">(pressure equalizes)</text>
                
                <!-- Wall thickness callouts -->
                <line x1="50" y1="380" x2="60" y2="380" class="dim-line"/>
                <line x1="50" y1="375" x2="50" y2="385" class="dim-line"/>
                <line x1="60" y1="375" x2="60" y2="385" class="dim-line"/>
                <text x="55" y="398" text-anchor="middle" class="dim-text">¾"</text>
                
                <!-- Overall dimension -->
                <line x1="50" y1="370" x2="350" y2="370" class="dim-line"/>
                <line x1="50" y1="365" x2="50" y2="375" class="dim-line"/>
                <line x1="350" y1="365" x2="350" y2="375" class="dim-line"/>
                <text x="200" y="390" text-anchor="middle" class="dim-text">29.5"</text>
                
                <!-- Window dimension -->
                <line x1="150" y1="165" x2="250" y2="165" stroke="#888" stroke-width="1"/>
                <text x="200" y="160" text-anchor="middle" class="label-small">12" window</text>
            </svg>
        </div>
        
        <!-- Corner detail -->
        <div class="diagram">
            <h2>Corner Leg Attachment Detail</h2>
            <svg width="400" height="350" viewBox="0 0 400 350">
                <!-- Cabinet corner (cutaway) -->
                <rect x="100" y="50" width="200" height="15" class="mdf"/>
                <rect x="100" y="50" width="15" height="180" class="mdf"/>
                <rect x="100" y="215" width="200" height="15" class="mdf"/>
                
                <!-- Internal cavity indication -->
                <rect x="115" y="65" width="185" height="150" class="cutout"/>
                
                <!-- Leg -->
                <rect x="120" y="235" width="50" height="60" class="leg" rx="3"/>
                
                <!-- Rubber pad -->
                <rect x="120" y="295" width="50" height="8" class="rubber" rx="2"/>
                
                <!-- Screws -->
                <line x1="145" y1="230" x2="145" y2="260" stroke="#888" stroke-width="3"/>
                <circle cx="145" cy="227" r="5" fill="#888"/>
                <line x1="115" y1="260" x2="135" y2="260" stroke="#888" stroke-width="3"/>
                <circle cx="112" cy="260" r="5" fill="#888"/>
                
                <!-- Floor -->
                <rect x="50" y="310" width="300" height="30" class="floor"/>
                <text x="200" y="330" text-anchor="middle" class="label">FLOOR</text>
                
                <!-- Air gap -->
                <rect x="170" y="235" width="130" height="75" class="air-gap"/>
                <text x="235" y="280" text-anchor="middle" class="annotation">4" air gap</text>
                
                <!-- Labels -->
                <text x="145" y="270" text-anchor="middle" class="label-small" style="fill: #ddd;">LEG</text>
                <text x="260" y="55" class="callout">Bottom panel (¾")</text>
                <text x="260" y="75" class="callout">Side panel (¾")</text>
                
                <!-- Screw callouts -->
                <text x="165" y="245" class="annotation">← Screw down</text>
                <text x="95" y="250" text-anchor="end" class="annotation">Screw in →</text>
                
                <!-- Dimension: leg inset -->
                <line x1="100" y1="320" x2="120" y2="320" class="dim-line"/>
                <line x1="100" y1="315" x2="100" y2="325" class="dim-line"/>
                <line x1="120" y1="315" x2="120" y2="325" class="dim-line"/>
                <text x="110" y="340" text-anchor="middle" class="dim-text">½"</text>
                
                <!-- Dimension: leg size -->
                <line x1="120" y1="235" x2="170" y2="235" stroke="#888" stroke-width="1" stroke-dasharray="3,2"/>
                <text x="145" y="225" text-anchor="middle" class="label-small">3.5"</text>
            </svg>
        </div>
        
        <!-- Driver cutout detail -->
        <div class="diagram">
            <h2>Driver Mounting Detail</h2>
            <svg width="400" height="350" viewBox="0 0 400 350">
                <!-- Panel section -->
                <rect x="50" y="140" width="300" height="15" class="mdf"/>
                
                <!-- Cutout -->
                <rect x="130" y="140" width="140" height="15" class="cutout"/>
                
                <!-- Driver frame -->
                <rect x="115" y="125" width="170" height="15" fill="#444" stroke="#666" rx="2"/>
                
                <!-- Driver cone (simplified) -->
                <ellipse cx="200" cy="100" rx="70" ry="20" class="driver"/>
                <ellipse cx="200" cy="100" rx="50" ry="14" class="driver-cone"/>
                <ellipse cx="200" cy="100" rx="25" ry="7" class="driver-cone"/>
                
                <!-- Gasket tape -->
                <rect x="130" y="137" width="140" height="3" fill="#666" rx="1"/>
                <text x="320" y="142" class="annotation">← Gasket tape</text>
                
                <!-- T-nut (shown in section) -->
                <rect x="120" y="155" width="10" height="15" fill="#888"/>
                <rect x="117" y="155" width="16" height="4" fill="#888"/>
                
                <!-- Bolt -->
                <rect x="122" y="115" width="6" height="45" fill="#aaa"/>
                <rect x="119" y="112" width="12" height="6" fill="#aaa"/>
                
                <!-- Labels -->
                <text x="200" y="60" text-anchor="middle" class="label">DRIVER</text>
                <text x="200" y="75" text-anchor="middle" class="label-small">(47 lbs each)</text>
                
                <text x="90" y="175" text-anchor="end" class="annotation">T-nut →</text>
                <text x="90" y="125" text-anchor="end" class="annotation">1/4-20 bolt →</text>
                <text x="200" y="165" text-anchor="middle" class="label-small">Panel (¾" MDF)</text>
                
                <!-- Bolt circle indication -->
                <ellipse cx="200" cy="140" rx="75" ry="8" fill="none" stroke="#888" stroke-width="1" stroke-dasharray="4,2"/>
                <text x="200" y="200" text-anchor="middle" class="label-small">17.75" bolt circle</text>
                <text x="200" y="215" text-anchor="middle" class="label-small">8 bolts per driver</text>
                
                <!-- Dimensions -->
                <line x1="130" y1="230" x2="270" y2="230" class="dim-line"/>
                <line x1="130" y1="225" x2="130" y2="235" class="dim-line"/>
                <line x1="270" y1="225" x2="270" y2="235" class="dim-line"/>
                <text x="200" y="250" text-anchor="middle" class="dim-text">16.875" cutout</text>
            </svg>
        </div>
        
    </div>
</body>
</html>
